name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version Override (Optional, e.g., 1.0.6). If empty, version will be read from gnnshortner.php'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Extract Version from gnnshortner.php
        id: get_version
        run: |
          VERSION_INPUT="${{ github.event.inputs.version_override }}"
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION=$(grep -m 1 "Version:" gnnshortner.php | awk '{print $NF}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Build Directory and Zip
        run: |
          # Define zip name
          ZIP_NAME="gnn-shortner-${{ env.VERSION }}.zip"
          
          # Create a temporary directory for clean build and a subfolder for the plugin
          mkdir -p build/gnn-shortner
          
          # Use rsync to copy files, excluding the build directory itself and other dev files
          rsync -av --exclude='build' \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='memory-bank' \
                    --exclude='specs' \
                    --exclude='agents' \
                    --exclude='tasks' \
                    --exclude='docs' \
                    --exclude='archive' \
                    --exclude='.gitignore' \
                    --exclude='*.md' \
                    ./ build/gnn-shortner/
          
          # Explicitly include only CHANGELOG.md
          cp CHANGELOG.md build/gnn-shortner/
          
          # Zip the build directory (this will include the gnn-shortner folder)
          cd build && zip -r "../$ZIP_NAME" gnn-shortner && cd ..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
